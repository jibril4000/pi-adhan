# Adhan Playback System Configuration
# Copy this file to config.yaml and adjust values for your location.

location:
  # GPS coordinates for prayer time calculation
  latitude: 34.3078       # Sylmar, Los Angeles, CA
  longitude: -118.4467
  # IANA timezone identifier (used for all scheduling)
  timezone: "America/Los_Angeles"

calculation:
  # Calculation method for prayer angles
  # Options: NORTH_AMERICA (ISNA), MUSLIM_WORLD_LEAGUE, EGYPTIAN,
  #          KARACHI, UMM_AL_QURA, DUBAI, MOON_SIGHTING_COMMITTEE,
  #          KUWAIT, QATAR, SINGAPORE, TEHRAN, TURKEY
  method: "NORTH_AMERICA"

audio:
  # Default adhan audio file (relative to project root)
  default_file: "audio/adhan_default.mp3"

  # Optional per-prayer overrides (comment out if not needed)
  per_prayer:
    fajr: "audio/adhan_fajr.mp3"
    # dhuhr: "audio/adhan_dhuhr.mp3"
    # asr: "audio/adhan_asr.mp3"
    # maghrib: "audio/adhan_maghrib.mp3"
    # isha: "audio/adhan_isha.mp3"

  # Playback volume (0-100). Keep at 100 and control level at the mixer.
  volume: 100

prayers:
  # List of prayers to disable (skip playback). Remove from list to re-enable.
  # Valid names: fajr, dhuhr, asr, maghrib, isha
  disabled: []
  # disabled:
  #   - fajr

background:
  # Enable 24/7 ambient background audio that pauses for adhan and Bluetooth
  enabled: false
  # Background audio file (relative to project root)
  file: "audio/background.mp3"
  # Playback volume (0-100) — keep low for ambient listening
  volume: 30
  # Fade out/in duration in seconds before/after adhan
  fade_duration: 3.0

  # Quiet hours: windows where ALL audio stays silent (background and radio).
  # Adhan is also skipped during these windows. Times are local (HH:MM), and
  # each entry lists the days it applies to.
  quiet_hours:
    # Friday Jummah — stay silent during the prayer (padded for safety)
    - days: [friday]
      start: "15:00"
      end: "16:30"

scheduler:
  # Time (HH:MM) to recalculate prayer times daily
  daily_recalc_time: "00:05"

  # Seconds after scheduled time to still play adhan (misfire recovery)
  misfire_grace_seconds: 300

radio:
  # Enable MMR radio streaming (plays your catalog through the Pi speakers)
  # When enabled, this replaces background audio. Adhan still interrupts as normal.
  enabled: false

  # MMR GraphQL API endpoint
  api_url: "https://api.mysticmeditationrecords.com/graphql"

  # MMR account credentials (optional — track listing works without auth)
  # Providing credentials may unlock higher quality streams for premium accounts.
  email: ""
  password: ""

  # Playback volume (0-100)
  volume: 50

  # Fade out/in duration in seconds before/after adhan
  fade_duration: 3.0

  # Per-day play windows (HH:MM, 24-hour format)
  # Radio streams only during these windows. Outside the window, background
  # audio (if enabled) takes over.
  schedule:
    - days: [sunday, monday, tuesday, wednesday]
      start: "07:00"
      end: "20:00"
    - days: [thursday, friday, saturday]
      start: "07:00"
      end: "19:00"

  # Shuffle the catalog (true) or play in order (false)
  shuffle: true

alerts:
  # Email alerts via Resend when the service is down, audio fails, or errors
  # pile up. Sent by a separate systemd timer (adhan-healthcheck.timer) that
  # runs independently of the main daemon, so you still get an email even if
  # the daemon is dead or wedged.
  enabled: false

  # Resend API key (https://resend.com/api-keys). Keep this private — config.yaml
  # is gitignored, so the key never lands in the repo.
  resend_api_key: ""

  # Sender must be on a domain you've verified in Resend (or onboarding@resend.dev
  # for testing). Recipients can be one address or a list.
  email_from: "live@omninine.studio"
  email_to:
    - "sufimeditationzawiya@gmail.com"

  # Trip an alert when more than this many ERROR lines appear within the window.
  error_threshold: 10
  error_window_minutes: 15

  # Send one "all healthy" email per day at this local hour (0-23). Silence then
  # becomes a signal: no heartbeat means something is wrong.
  heartbeat: true
  heartbeat_hour: 9

logging:
  # Log file path (relative to project root)
  file: "logs/adhan.log"
  # Max size per log file in bytes (5 MB)
  max_bytes: 5242880
  # Number of backup log files to keep
  backup_count: 3
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
