# Layer 3: hardware watchdog backstop.
# systemd pets the Pi's /dev/watchdog every RuntimeWatchdogSec/2. If systemd or
# the kernel itself wedges and stops petting, the SoC hard-resets the board.
# Catches whole-system freezes that no software restart can recover from.
# Pairs with the UPS: UPS handles power loss, this handles software lock-up.
[Manager]
RuntimeWatchdogSec=20
RebootWatchdogSec=2min
